apiVersion: batch/v1
kind: Job
metadata:
  name: db-init-roles
  namespace: micro-cockpit
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: db-init-roles
    spec:
      restartPolicy: Never
      containers:
        - name: db-init
          image: postgres:17-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGDATABASE
              value: trade_diary
            - name: PGUSER
              value: trade_diary
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: MIGRATOR_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MIGRATOR_DB_PASSWORD
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: IDENTITY_DB_PASSWORD
            - name: JOURNAL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: JOURNAL_DB_PASSWORD
            - name: PERFORMANCE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PERFORMANCE_DB_PASSWORD
            - name: DISCIPLINE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DISCIPLINE_DB_PASSWORD
            - name: REMINDER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: REMINDER_DB_PASSWORD
            - name: MARKET_DATA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: MARKET_DATA_DB_PASSWORD
            - name: PRICE_ALERT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PRICE_ALERT_DB_PASSWORD
            - name: ROTATION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: ROTATION_DB_PASSWORD
            - name: STOCK_RESEARCH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: STOCK_RESEARCH_DB_PASSWORD
            - name: PARTNER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PARTNER_DB_PASSWORD
            - name: CONTENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: CONTENT_DB_PASSWORD
            - name: OPERATIONS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: OPERATIONS_DB_PASSWORD
          volumeMounts:
            - name: roles-sql
              mountPath: /roles
              readOnly: true
          command: ["/roles/apply.sh"]
      volumes:
        - name: roles-sql
          configMap:
            name: postgres-roles-sql
            defaultMode: 0755
