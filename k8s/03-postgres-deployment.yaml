apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: micro-cockpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          # Leave headroom for one pool per service plus the migration and operator connections.
          # The default PostgreSQL limit of 100 is too small for the 13-service topology.
          command: ["docker-entrypoint.sh", "postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: trade_diary
            - name: POSTGRES_USER
              value: trade_diary
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "trade_diary", "-d", "trade_diary"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "trade_diary", "-d", "trade_diary"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
