apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: micro-cockpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
        - name: identity
          image: git.913555.xyz/etklam/micro-cockpit/identity:REQUIRED_IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Identity
              valueFrom:
                secretKeyRef:
                  name: service-connection-strings
                  key: "IDENTITY_CONNECTION_STRING"
            - name: Auth__AllowPublicRegistration
              value: "false"
            - name: Auth__LocalRegistrationKey
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: LOCAL_REGISTRATION_KEY
            - name: Jwt__Issuer
              value: "trade-diary-identity"
            - name: Jwt__Audience
              value: "trade-diary-services"
            - name: Jwt__PrivateKeyPath
              value: "/keys/signing-key.pem"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: identity-keys
              mountPath: /keys
      volumes:
        - name: identity-keys
          persistentVolumeClaim:
            claimName: identity-keys
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: micro-cockpit
spec:
  selector:
    app: identity
  ports:
    - port: 8080
      targetPort: 8080

