name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-micro-cockpit-production
  cancel-in-progress: false

env:
  REGISTRY: git.913555.xyz
  REPO_OWNER: etklam
  REPO_NAME: micro-cockpit
  DEPLOY_NAMESPACE: micro-cockpit

jobs:
  build-and-deploy:
    runs-on: hk
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ forgejo.sha }}
          fetch-depth: 0

      - name: Validate repository secrets
        run: |
          set -eu
          bash -n scripts/*.sh
          python3 scripts/validate-migrations.py
          python3 scripts/audit-migrations.py
          python3 scripts/verify-no-plaintext-k8s-secrets.py
          ./tests/verify-secret-handling.sh
          ./tests/verify-deployment-safety.sh
          ./tests/verify-rotation-safety.sh
          ./tests/verify-runtime-secret-source.sh
          ./tests/verify-k8s-operation-lock.sh
          ./tests/verify-migration-safety.sh

      - name: Resolve immutable image tag
        run: |
          set -eu
          image_tag=$(git rev-parse HEAD)
          test "$image_tag" = "${{ forgejo.sha }}"
          printf '%s=%s\n' IMAGE_TAG "$image_tag" >>"$GITHUB_ENV"

      - name: Install Docker CLI
        run: |
          apt-get update -qq && apt-get install -y -qq ca-certificates curl gnupg lsb-release openssh-client > /dev/null 2>&1
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
          apt-get update -qq && apt-get install -y -qq docker-ce-cli > /dev/null 2>&1
          docker version

      - name: Scan current tree with gitleaks
        run: |
          set -eu
          tools=$(mktemp -d)
          trap 'rm -rf "$tools"' EXIT HUP INT TERM
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o "$tools/gitleaks.tgz"
          printf '%s  %s\n' 'fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e' "$tools/gitleaks.tgz" | sha256sum --check --status
          tar -xzf "$tools/gitleaks.tgz" -C "$tools" gitleaks
          PATH="$tools:$PATH"
          gitleaks dir . --redact

      - name: Login to Forgejo Container Registry
        run: |
          printf '%s' "${{ secrets.REGISTRY_TOKEN }}" | docker login "$REGISTRY" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build and push all service images
        run: |
          set -eu
          IMAGE_BASE="${REGISTRY}/${REPO_OWNER}/${REPO_NAME}"
          build_and_push() {
            name="$1"
            dockerfile="$2"
            image="${IMAGE_BASE}/${name}:${IMAGE_TAG}"
            docker build --platform linux/amd64 -t "$image" -f "$dockerfile" .
            docker push "$image"
          }
          build_and_push db-migrator platform/postgres/Dockerfile
          build_and_push identity services/identity-service/src/TradeDiary.Identity/Dockerfile
          build_and_push journal services/journal-service/src/TradeDiary.Journal/Dockerfile
          build_and_push performance services/performance-service/src/TradeDiary.Performance/Dockerfile
          build_and_push discipline services/discipline-service/src/TradeDiary.Discipline/Dockerfile
          build_and_push reminder services/reminder-service/src/TradeDiary.Reminder/Dockerfile
          build_and_push stock-research services/stock-research-service/src/TradeDiary.StockResearch/Dockerfile
          build_and_push market-data services/market-data-service/src/TradeDiary.MarketData/Dockerfile
          build_and_push price-alert services/price-alert-service/src/TradeDiary.PriceAlert/Dockerfile
          build_and_push rotation services/rotation-service/src/TradeDiary.Rotation/Dockerfile
          build_and_push partner services/partner-service/src/TradeDiary.Partner/Dockerfile
          build_and_push content services/content-service/src/TradeDiary.Content/Dockerfile
          build_and_push tool services/tool-service/src/TradeDiary.Tool/Dockerfile
          build_and_push operations services/operations-service/src/TradeDiary.Operations/Dockerfile
          build_and_push edge gateway/TradeDiary.EdgeApi/Dockerfile
          build_and_push frontend frontend/Dockerfile

      - name: Deploy exact manifests using existing runtime Secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          set -euo pipefail
          set +x
          umask 077
          scripts/validate-deploy-ssh-inputs.sh >/dev/null
          [[ "$DEPLOY_NAMESPACE" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]] || { echo "Invalid deployment namespace." >&2; exit 1; }
          work=$(mktemp -d)
          known_hosts=$(mktemp)
          remote=""
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" >"$known_hosts"
          chmod 600 "$known_hosts"
          ssh_options=(-o StrictHostKeyChecking=yes -o UserKnownHostsFile="$known_hosts" -o IdentitiesOnly=yes -i "$work/deploy_key")
          cleanup() {
            if [ -n "$remote" ]; then
              ssh "${ssh_options[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" "rm -rf '$remote'" >/dev/null 2>&1 || true
            fi
            rm -rf "$work"
            rm -f "$known_hosts"
          }
          trap cleanup EXIT HUP INT TERM
          printf '%s' "$DEPLOY_SSH_KEY" >"$work/deploy_key"
          chmod 600 "$work/deploy_key"
          tar -czf "$work/deploy.tgz" k8s scripts/apply-k8s-manifests.sh scripts/deploy-k8s-release.sh scripts/run-k8s-database-upgrade.sh scripts/verify-k8s-runtime-secrets.sh scripts/with-k8s-operation-lock.sh
          remote=$(ssh "${ssh_options[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'mktemp -d /tmp/micro-cockpit-deploy.XXXXXX')
          scp -q "${ssh_options[@]}" "$work/deploy.tgz" "${DEPLOY_USER}@${DEPLOY_HOST}:$remote/"
          ssh "${ssh_options[@]}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "REMOTE_DIR='$remote' DEPLOY_NAMESPACE='$DEPLOY_NAMESPACE' IMAGE_REGISTRY='${REGISTRY}/${REPO_OWNER}/${REPO_NAME}' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE'
          set -euo pipefail
          set +x
          cleanup_remote() { rm -rf "$REMOTE_DIR"; }
          trap cleanup_remote EXIT HUP INT TERM
          cd "$REMOTE_DIR"
          tar -xzf deploy.tgz
          chmod 700 scripts/apply-k8s-manifests.sh scripts/deploy-k8s-release.sh scripts/run-k8s-database-upgrade.sh scripts/verify-k8s-runtime-secrets.sh scripts/with-k8s-operation-lock.sh
          scripts/with-k8s-operation-lock.sh --namespace "$DEPLOY_NAMESPACE" --timeout 900 -- bash -c '
            set -euo pipefail
            scripts/verify-k8s-runtime-secrets.sh --namespace "$DEPLOY_NAMESPACE"
            scripts/apply-k8s-manifests.sh --namespace "$DEPLOY_NAMESPACE" --skip-services
            scripts/run-k8s-database-upgrade.sh --namespace "$DEPLOY_NAMESPACE" --image-registry "$IMAGE_REGISTRY" --image-tag "$IMAGE_TAG"
            scripts/deploy-k8s-release.sh --namespace "$DEPLOY_NAMESPACE" --image-registry "$IMAGE_REGISTRY" --image-tag "$IMAGE_TAG" --skip-infrastructure
          '
          REMOTE
          remote=""
