x-dotnet: &dotnet
  restart: unless-stopped
  environment: &dotnet-env
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:8080
  networks: [backend]
  healthcheck: &dotnet-health
    test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
    interval: 10s
    timeout: 3s
    retries: 10
    start_period: 10s

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trade_diary
      POSTGRES_USER: trade_diary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports: ["127.0.0.1:5433:5432"]
    volumes:
      - trade-diary-data:/var/lib/postgresql/data
      - ./platform/postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trade_diary -d trade_diary"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-init:
    image: postgres:17-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGDATABASE: trade_diary
      PGUSER: trade_diary
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      MIGRATOR_DB_PASSWORD: ${MIGRATOR_DB_PASSWORD:?set MIGRATOR_DB_PASSWORD}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD:?set IDENTITY_DB_PASSWORD}
      JOURNAL_DB_PASSWORD: ${JOURNAL_DB_PASSWORD:?set JOURNAL_DB_PASSWORD}
      PERFORMANCE_DB_PASSWORD: ${PERFORMANCE_DB_PASSWORD:?set PERFORMANCE_DB_PASSWORD}
      DISCIPLINE_DB_PASSWORD: ${DISCIPLINE_DB_PASSWORD:?set DISCIPLINE_DB_PASSWORD}
      REMINDER_DB_PASSWORD: ${REMINDER_DB_PASSWORD:?set REMINDER_DB_PASSWORD}
      MARKET_DATA_DB_PASSWORD: ${MARKET_DATA_DB_PASSWORD:?set MARKET_DATA_DB_PASSWORD}
      PRICE_ALERT_DB_PASSWORD: ${PRICE_ALERT_DB_PASSWORD:?set PRICE_ALERT_DB_PASSWORD}
      ROTATION_DB_PASSWORD: ${ROTATION_DB_PASSWORD:?set ROTATION_DB_PASSWORD}
      STOCK_RESEARCH_DB_PASSWORD: ${STOCK_RESEARCH_DB_PASSWORD:?set STOCK_RESEARCH_DB_PASSWORD}
      PARTNER_DB_PASSWORD: ${PARTNER_DB_PASSWORD:?set PARTNER_DB_PASSWORD}
      CONTENT_DB_PASSWORD: ${CONTENT_DB_PASSWORD:?set CONTENT_DB_PASSWORD}
      OPERATIONS_DB_PASSWORD: ${OPERATIONS_DB_PASSWORD:?set OPERATIONS_DB_PASSWORD}
    volumes:
      - ./platform/postgres/roles:/roles:ro
    command: ["/roles/apply.sh"]
    networks: [backend]
    depends_on:
      postgres: { condition: service_healthy }

  identity:
    <<: *dotnet
    build:
      context: .
      dockerfile: services/identity-service/src/TradeDiary.Identity/Dockerfile
    environment:
      <<: *dotnet-env
      ConnectionStrings__Identity: Host=postgres;Database=trade_diary;Username=identity_service;Password=${IDENTITY_DB_PASSWORD:?set IDENTITY_DB_PASSWORD}
      Auth__LocalRegistrationKey: ${LOCAL_REGISTRATION_KEY:-change-me-before-exposing}
      Jwt__Issuer: trade-diary-identity
      Jwt__Audience: trade-diary-services
      Jwt__PrivateKeyPath: /keys/signing-key.pem
    volumes:
      - identity-keys:/keys
    depends_on:
      db-init: { condition: service_completed_successfully }

  journal:
    <<: *dotnet
    build:
      context: .
      dockerfile: services/journal-service/src/TradeDiary.Journal/Dockerfile
    environment:
      <<: *dotnet-env
      ConnectionStrings__Journal: Host=postgres;Database=trade_diary;Username=journal_service;Password=${JOURNAL_DB_PASSWORD:?set JOURNAL_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
      Services__Reminder: http://reminder:8080
      Internal__ServiceKey: ${INTERNAL_SERVICE_KEY:-change-me-before-exposing}
    depends_on:
      identity: { condition: service_healthy }

  performance:
    <<: *dotnet
    build:
      context: .
      dockerfile: services/performance-service/src/TradeDiary.Performance/Dockerfile
    environment:
      <<: *dotnet-env
      ConnectionStrings__Performance: Host=postgres;Database=trade_diary;Username=performance_service;Password=${PERFORMANCE_DB_PASSWORD:?set PERFORMANCE_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on:
      identity: { condition: service_healthy }

  discipline:
    <<: *dotnet
    build:
      context: .
      dockerfile: services/discipline-service/src/TradeDiary.Discipline/Dockerfile
    environment:
      <<: *dotnet-env
      ConnectionStrings__Discipline: Host=postgres;Database=trade_diary;Username=discipline_service;Password=${DISCIPLINE_DB_PASSWORD:?set DISCIPLINE_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on:
      identity: { condition: service_healthy }

  reminder:
    <<: *dotnet
    build:
      context: .
      dockerfile: services/reminder-service/src/TradeDiary.Reminder/Dockerfile
    environment:
      <<: *dotnet-env
      ConnectionStrings__Reminder: Host=postgres;Database=trade_diary;Username=reminder_service;Password=${REMINDER_DB_PASSWORD:?set REMINDER_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
      Services__Journal: http://journal:8080
      Internal__ServiceKey: ${INTERNAL_SERVICE_KEY:-change-me-before-exposing}
    depends_on:
      identity: { condition: service_healthy }
      journal: { condition: service_healthy }

  stock-research:
    <<: *dotnet
    build: { context: ., dockerfile: services/stock-research-service/src/TradeDiary.StockResearch/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__StockResearch: Host=postgres;Database=trade_diary;Username=stock_research_service;Password=${STOCK_RESEARCH_DB_PASSWORD:?set STOCK_RESEARCH_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on: { identity: { condition: service_healthy } }

  market-data:
    <<: *dotnet
    build: { context: ., dockerfile: services/market-data-service/src/TradeDiary.MarketData/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__MarketData: Host=postgres;Database=trade_diary;Username=market_data_service;Password=${MARKET_DATA_DB_PASSWORD:?set MARKET_DATA_DB_PASSWORD}
      Internal__ServiceKey: ${INTERNAL_SERVICE_KEY:-change-me-before-exposing}
    depends_on: { db-init: { condition: service_completed_successfully } }

  price-alert:
    <<: *dotnet
    build: { context: ., dockerfile: services/price-alert-service/src/TradeDiary.PriceAlert/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__PriceAlert: Host=postgres;Database=trade_diary;Username=price_alert_service;Password=${PRICE_ALERT_DB_PASSWORD:?set PRICE_ALERT_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on:
      identity: { condition: service_healthy }
      market-data: { condition: service_healthy }

  rotation:
    <<: *dotnet
    build: { context: ., dockerfile: services/rotation-service/src/TradeDiary.Rotation/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__Rotation: Host=postgres;Database=trade_diary;Username=rotation_service;Password=${ROTATION_DB_PASSWORD:?set ROTATION_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on:
      identity: { condition: service_healthy }
      market-data: { condition: service_healthy }

  partner:
    <<: *dotnet
    build: { context: ., dockerfile: services/partner-service/src/TradeDiary.Partner/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__Partner: Host=postgres;Database=trade_diary;Username=partner_service;Password=${PARTNER_DB_PASSWORD:?set PARTNER_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on: { identity: { condition: service_healthy } }

  content:
    <<: *dotnet
    build: { context: ., dockerfile: services/content-service/src/TradeDiary.Content/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__Content: Host=postgres;Database=trade_diary;Username=content_service;Password=${CONTENT_DB_PASSWORD:?set CONTENT_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on: { identity: { condition: service_healthy } }

  tool:
    <<: *dotnet
    build: { context: ., dockerfile: services/tool-service/src/TradeDiary.Tool/Dockerfile }
    environment:
      <<: *dotnet-env
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on: { identity: { condition: service_healthy } }

  operations:
    <<: *dotnet
    build: { context: ., dockerfile: services/operations-service/src/TradeDiary.Operations/Dockerfile }
    environment:
      <<: *dotnet-env
      ConnectionStrings__Operations: Host=postgres;Database=trade_diary;Username=operations_service;Password=${OPERATIONS_DB_PASSWORD:?set OPERATIONS_DB_PASSWORD}
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
    depends_on: { identity: { condition: service_healthy } }

  edge:
    <<: *dotnet
    build:
      context: .
      dockerfile: gateway/TradeDiary.EdgeApi/Dockerfile
    environment:
      <<: *dotnet-env
      Auth__MetadataAddress: http://identity:8080/.well-known/openid-configuration
      Services__Identity: http://identity:8080
      Services__Journal: http://journal:8080
      Services__Performance: http://performance:8080
      Services__Discipline: http://discipline:8080
      Services__Reminder: http://reminder:8080
      Services__StockResearch: http://stock-research:8080
      Services__MarketData: http://market-data:8080
      Services__PriceAlert: http://price-alert:8080
      Services__Rotation: http://rotation:8080
      Services__Partner: http://partner:8080
      Services__Content: http://content:8080
      Services__Tool: http://tool:8080
      Services__Operations: http://operations:8080
    ports: ["5099:8080"]
    networks: [backend, public]
    depends_on:
      journal: { condition: service_healthy }
      performance: { condition: service_healthy }
      discipline: { condition: service_healthy }
      reminder: { condition: service_healthy }
      stock-research: { condition: service_healthy }
      market-data: { condition: service_healthy }
      price-alert: { condition: service_healthy }
      rotation: { condition: service_healthy }
      partner: { condition: service_healthy }
      content: { condition: service_healthy }
      tool: { condition: service_healthy }
      operations: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports: ["8080:8080"]
    networks: [backend, public]
    depends_on:
      edge: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  backend:
    internal: true
  public:

volumes:
  trade-diary-data:
  identity-keys:
