name: e2e

on:
  workflow_dispatch:   # manual — full container stack + runtime checks; not on every push

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare .env from template (ephemeral E2E secrets)
        run: |
          set -eu
          umask 077
          : >.env
          for key in POSTGRES_PASSWORD MIGRATOR_DB_PASSWORD IDENTITY_DB_PASSWORD JOURNAL_DB_PASSWORD PERFORMANCE_DB_PASSWORD DISCIPLINE_DB_PASSWORD REMINDER_DB_PASSWORD STOCK_RESEARCH_DB_PASSWORD MARKET_DATA_DB_PASSWORD PRICE_ALERT_DB_PASSWORD ROTATION_DB_PASSWORD PARTNER_DB_PASSWORD CONTENT_DB_PASSWORD OPERATIONS_DB_PASSWORD LOCAL_REGISTRATION_KEY INTERNAL_SERVICE_KEY; do
            value=$(openssl rand -hex 32)
            printf '%s=%s\n' "$key" "$value" >>.env
            printf '%s=%s\n' "$key" "$value" >>"$GITHUB_ENV"
          done
          printf '%s=%s\n' TEST_PASSWORD "$(openssl rand -hex 32)" >>"$GITHUB_ENV"

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start the full stack
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Stack health
        run: |
          docker compose ps
          curl -fsS http://localhost:5099/health/ready
          curl -fsS http://localhost:8080/ >/dev/null

      - name: Register ephemeral smoke user
        env:
          EDGE_URL: http://127.0.0.1:5099
          TEST_EMAIL: owner@example.com
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "X-Registration-Key: $LOCAL_REGISTRATION_KEY" \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg email "$TEST_EMAIL" --arg password "$TEST_PASSWORD" \
              '{email:$email,password:$password,displayName:"E2E Owner",timezone:"UTC",baseCurrency:"USD"}')" \
            "$EDGE_URL/api/auth/register")
          test "$code" = 201 || test "$code" = 409

      - name: Smoke tests (Edge auth, ownership, partner compare, release paths, degradation)
        env:
          EDGE_URL: http://127.0.0.1:5099
          TEST_EMAIL: owner@example.com
        run: |
          set -a
          source .env
          set +a
          chmod +x tests/*.sh
          ./tests/smoke-auth.sh
          ./tests/smoke-journal-idempotency.sh
          ./tests/smoke-jwt-ownership.sh
          ./tests/smoke-partner-compare.sh
          ./tests/smoke-release-paths.sh
          ./tests/service-unavailable-degradation.sh
          ./tests/postgres-role-isolation.sh

      - name: Logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose down -v
